name: Docker Build & Trivy Scan

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: duniversity-actions
      TAG: v1.1.0

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      run: |
        docker build -t $IMAGE_NAME:$TAG .

    - name: Install Trivy
      uses: aquasecurity/trivy-action@v0.20.0

    - name: Scan Docker Image with Trivy
      run: |
        trivy image --severity HIGH,CRITICAL --exit-code 0 $IMAGE_NAME:$TAG

    - name: Login DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Tag Dockerimage
      run: |
        docker tag $IMAGE_NAME:$TAG ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:$TAG
    
    - name: Push Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:$TAG
