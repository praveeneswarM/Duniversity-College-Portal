apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name }}
  namespace: praveen-ns 
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: duni 
  template:
    metadata:
      labels:
        app: duni 
    spec:
      containers:
        - name: duni-container
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          ports:
            - containerPort: {{ .Values.ports.containerPort }}
          # env:
          # - name: DB_HOST
          #   valueFrom:
          #     configMapKeyRef:
          #       name: duni-config
          #       key: DB_HOST
            
          # - name: DB_PORT
          #   valueFrom:
          #     configMapKeyRef:
          #       name: duni-config
          #       key: DB_PORT
            
          # - name: MYSQLDB_USER
          #   valueFrom:
          #     secretKeyRef:
          #       name: duni-secret
          #       key: DB_USER
            
          # - name: MYSQL_PASSWORD
          #   valueFrom:
          #     secretKeyRef:
          #       name: duni-secret
          #       key: DB_PASSWORD
          envFrom:
            - configMapRef:
                name: duni-config
            - secretRef:
                name: duni-secret

---
apiVersion: v1
kind: Service
metadata:
  name: duni-service 
  namespace: praveen-ns
spec:
  selector:
    app: duni
  ports:
  - port: {{ .Values.ports.hostPort }}
    targetPort: {{ .Values.ports.containerPort }}
  type: ClusterIP